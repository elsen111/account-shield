spring:
  application:
    name: account-shield

  datasource:
    url: jdbc:postgresql://localhost:5432/account_shield_db
    username: postgres
    password: ${DB_PASSWORD:fallback_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    open-in-view: false

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: 8080

jwt:
  secret: 2f9db91d7d5a58e7f92d88c47b6b90c82e54e8b72ef42c6d4d51f4d73f24fd53
  access-expiration: 900000
  refresh-expiration: 604800000

security:
  login:
    max-attempts: 5
    lock-duration-minutes: 15

  verification:
    token-expiration-minutes: 1440
    base-url: ${VERIFICATION_BASE_URL:http://localhost:8080/api/auth/verify-email}

app:
  mail:
    from: ${MAIL_FROM:no-reply@accountshield.com}

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG